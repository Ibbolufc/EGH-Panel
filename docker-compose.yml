services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eghpanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-eghpanel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eghpanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eghnet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - eghnet

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-eghpanel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eghpanel}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      NODE_ENV: production
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - eghnet

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    networks:
      - eghnet

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - eghnet

  # -----------------------------------------------------------------------
  # tools — one-off container for migrations and seeding.
  # Never starts automatically with `docker compose up`.
  # Invoke via the helper scripts in scripts/ or directly:
  #
  #   docker compose --profile tools run --rm tools \
  #     pnpm --filter @workspace/db run push-force
  #
  #   docker compose --profile tools run --rm tools \
  #     pnpm --filter @workspace/scripts run seed
  # -----------------------------------------------------------------------
  tools:
    build:
      context: .
      dockerfile: Dockerfile.tools
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-eghpanel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eghpanel}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eghnet
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  eghnet:
    driver: bridge
